name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          if [ -z "${{ secrets.HETZNER_HOST }}" ]; then
            echo "Error: HETZNER_HOST secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.HETZNER_USER }}" ]; then
            echo "Error: HETZNER_USER secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.HETZNER_APP_DIR }}" ]; then
            echo "Error: HETZNER_APP_DIR secret is missing"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          if [ ! -s ~/.ssh/hetzner_key ]; then
            echo "Error: SSH key file is empty"
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh \
            -i ~/.ssh/hetzner_key \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "APP_DIR='${{ secrets.HETZNER_APP_DIR }}' bash -lse" < .github/scripts/deploy-hetzner.sh
