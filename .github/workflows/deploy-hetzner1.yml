name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_APP_DIR: ${{ secrets.HETZNER_APP_DIR }}
        run: |
          test -n "$HETZNER_HOST" || { echo "Missing HETZNER_HOST"; exit 1; }
          test -n "$HETZNER_USER" || { echo "Missing HETZNER_USER"; exit 1; }
          test -n "$HETZNER_SSH_KEY" || { echo "Missing HETZNER_SSH_KEY"; exit 1; }
          test -n "$HETZNER_APP_DIR" || { echo "Missing HETZNER_APP_DIR"; exit 1; }

      - name: Install SSH key
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$HETZNER_SSH_KEY" > "$HOME/.ssh/hetzner_key"
          chmod 600 "$HOME/.ssh/hetzner_key"
          ssh-keyscan -H "$HETZNER_HOST" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_APP_DIR: ${{ secrets.HETZNER_APP_DIR }}
        run: |
          ssh \
            -i "$HOME/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$HETZNER_USER@$HETZNER_HOST" \
            "APP_DIR='$HETZNER_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "Connected as $(whoami) on $(hostname)"

          if [ ! -d "$APP_DIR" ]; then
            echo "App directory does not exist: $APP_DIR"
            exit 1
          fi

          cd "$APP_DIR"

          if [ ! -d .git ]; then
            echo "App directory is not a Git checkout: $APP_DIR"
            exit 1
          fi

          command -v git
          command -v npm
          command -v pm2

          git remote set-url origin https://github.com/samanthadiaz-glitch/cutthelock.git
          git fetch origin main
          git reset --hard origin/main
          npm ci
          npm run migrate
          npm run build
          pm2 restart cutthelock || pm2 start server.js --name cutthelock
          pm2 save
          REMOTE
