name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh \
            -i ~/.ssh/hetzner_key \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            'cd "${{ secrets.HETZNER_APP_DIR }}" &&
             git pull origin main &&
             npm ci &&
             npm run build &&
             (pm2 restart cutthelock || pm2 start server.js --name cutthelock)'
